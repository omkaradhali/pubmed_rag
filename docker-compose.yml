services:
  api:
    build: .
    ports:
      - "8001:8001"
    environment:
      # Skip HuggingFace Hub version check — model is pre-cached in the image.
      # Set HF_HUB_OFFLINE=0 to allow automatic model updates.
      HF_HUB_OFFLINE: "1"
    env_file:
      - .env
    volumes:
      # Persists ChromaDB vectors and ingested abstracts across container restarts.
      # Remove this mount only if VECTOR_STORE_BACKEND=qdrant (Qdrant has its own volume below).
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Production: Qdrant vector store ─────────────────────────────────────────
  # Set VECTOR_STORE_BACKEND=qdrant and QDRANT_URL=http://qdrant:6333 in .env,
  # then uncomment this block to run Qdrant alongside the API.
  #
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports:
  #     - "6333:6333"   # REST + gRPC
  #     - "6334:6334"   # gRPC
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   restart: unless-stopped

# volumes:
#   qdrant_data:
